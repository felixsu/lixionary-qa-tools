name: Release Desktop App

on:
  push:
    branches:
      - main
  workflow_dispatch:

# The default GITHUB_TOKEN is read-only; the bump-version job needs write to
# push the version-bump commit and tag, and tauri-action needs write to
# create the release and upload installer assets.
permissions:
  contents: write

jobs:
  # Every push to main ships a release: bump the patch version in
  # tauri.conf.json, commit it, and tag it. Guarded against the bump commit
  # itself re-triggering this job (belt-and-suspenders — pushes made with
  # GITHUB_TOKEN don't normally re-trigger workflows anyway).
  bump-version:
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: bump version to') }}"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag_name: ${{ steps.bump.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version and tag
        id: bump
        run: |
          set -euo pipefail
          CONF=frontend/src-tauri/tauri.conf.json
          CURRENT=$(node -p "require('./$CONF').version")

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse -q --verify "refs/tags/v$CURRENT" >/dev/null; then
            # v$CURRENT already shipped — auto-bump the patch as usual.
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEXT="$MAJOR.$MINOR.$((PATCH + 1))"

            node -e "
              const fs = require('fs');
              const path = '$CONF';
              const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
              conf.version = '$NEXT';
              fs.writeFileSync(path, JSON.stringify(conf, null, 2) + '\n');
            "

            git add "$CONF"
            git commit -m "chore: bump version to $NEXT"
            git push origin HEAD:main
          else
            # Version was hand-set (e.g. a minor/major bump merged in a PR) and
            # has never been released — ship it exactly as configured, no bump.
            NEXT="$CURRENT"
          fi

          git tag "v$NEXT"
          git push origin "v$NEXT"

          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$NEXT" >> "$GITHUB_OUTPUT"

  # Create the draft release once up front — when the matrix jobs each try to
  # find-or-create it by tag, they race and produce duplicate drafts with
  # split assets and partial latest.json manifests.
  create-release:
    needs: bump-version
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: create
        env:
          TAG_NAME: ${{ needs.bump-version.outputs.tag_name }}
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG_NAME,
              name: `Lixionary QA Tools ${process.env.TAG_NAME}`,
              body: [
                "See the assets below to download and install this version.",
                "",
                "### macOS install note",
                "The app is not notarized with Apple yet. After moving it to Applications, either:",
                "- approve it under **System Settings → Privacy & Security → Open Anyway**, or",
                "- run `xattr -cr \"/Applications/Lixionary QA Tools.app\"` in Terminal.",
                "",
                "Requirements: Python 3 and Google Chrome. First launch downloads sidecar dependencies (needs internet, ~2 minutes).",
              ].join("\n"),
              draft: true,
            });
            return data.id;

  build:
    needs: [bump-version, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-targets: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-targets: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Full ad-hoc codesign: seals bundle resources so quarantined
          # downloads get the standard "unverified developer" flow instead of
          # Gatekeeper's misleading "damaged and can't be opened" error.
          # Replace with a real Developer ID + notarization when available.
          APPLE_SIGNING_IDENTITY: "-"
        with:
          projectPath: frontend
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # Only after every platform build has succeeded: un-draft the release and
  # mark it latest so auto-update starts offering it. draft:false and
  # make_latest can't be set in the same PATCH (make_latest is silently
  # ignored when combined with draft:false), so this is two calls.
  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            const release_id = Number(process.env.RELEASE_ID);
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id,
              draft: false,
            });
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id,
              make_latest: "true",
            });
