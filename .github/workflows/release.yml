name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# The default GITHUB_TOKEN is read-only; tauri-action needs write to create
# the release and upload installer assets.
permissions:
  contents: write

jobs:
  # Create the draft release once up front — when the matrix jobs each try to
  # find-or-create it by tag, they race and produce duplicate drafts with
  # split assets and partial latest.json manifests.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: create
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.GITHUB_REF_NAME,
              name: `Lixionary QA Tools ${process.env.GITHUB_REF_NAME}`,
              body: [
                "See the assets below to download and install this version.",
                "",
                "### macOS install note",
                "The app is not notarized with Apple yet. After moving it to Applications, either:",
                "- approve it under **System Settings → Privacy & Security → Open Anyway**, or",
                "- run `xattr -cr \"/Applications/Lixionary QA Tools.app\"` in Terminal.",
                "",
                "Requirements: Python 3 and Google Chrome. First launch downloads sidecar dependencies (needs internet, ~2 minutes).",
              ].join("\n"),
              draft: true,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-targets: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-targets: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Full ad-hoc codesign: seals bundle resources so quarantined
          # downloads get the standard "unverified developer" flow instead of
          # Gatekeeper's misleading "damaged and can't be opened" error.
          # Replace with a real Developer ID + notarization when available.
          APPLE_SIGNING_IDENTITY: "-"
        with:
          projectPath: frontend
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
