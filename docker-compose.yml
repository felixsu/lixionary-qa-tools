version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: lixionary-mongodb
    # Host port 8483 (host) -> 27017 (container). Picked to avoid collision with
    # other stacks already on the box (reportportal :27017).
    ports:
      - "8483:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - lixionary-network

  redis:
    image: redis:7.0-alpine
    container_name: lixionary-redis
    # Host port 8482 (host) -> 6379 (container). Picked to avoid collision with
    # other stacks already on the box (nvqa-redis :6379).
    ports:
      - "8482:6379"
    volumes:
      - redis_data:/data
    networks:
      - lixionary-network

  vnc-browser:
    build:
      context: ./browser
      dockerfile: Dockerfile
    container_name: lixionary-vnc-browser
    ports:
      - "8080:8080" # noVNC web interface
      - "9222:9222" # CDP Remote Debugging
    shm_size: '2gb' # Prevent browser crashes
    networks:
      - lixionary-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lixionary-backend
    # Host port 8480 (host) -> 8000 (container). Picked to avoid collision with
    # other stacks already on the box (reportportal :8000).
    ports:
      - "8480:8000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/lixionary
      - REDIS_URL=redis://redis:6379/0
      - BROWSER_CDP_URL=http://vnc-browser:9222
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwttokenkey12345}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - DEV_MODE=${DEV_MODE:-true}
    volumes:
      - ./backend:/app
      - ./workspaces:/workspaces
    depends_on:
      - mongodb
      - redis
      - vnc-browser
    networks:
      - lixionary-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lixionary-frontend
    # Host port 8481 (host) -> 3000 (container). Picked to avoid collision with
    # other stacks already on the box (testsaurus :3000).
    ports:
      - "8481:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - lixionary-network

volumes:
  mongodb_data:
  redis_data:

networks:
  lixionary-network:
    driver: bridge
