name: lixionary-qa-tools

services:
  mongodb:
    image: mongo:6.0
    container_name: lixionary-qa-tools-mongodb
    ports:
      - "8483:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - lixionary-network

  redis:
    image: redis:7.0-alpine
    container_name: lixionary-qa-tools-redis
    ports:
      - "8482:6379"
    volumes:
      - redis_data:/data
    networks:
      - lixionary-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lixionary-qa-tools-backend
    ports:
      - "8480:8000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/lixionary
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwttokenkey12345}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - DEV_MODE=${DEV_MODE:-true}
      - IAM_CLIENT_ID=${IAM_CLIENT_ID:-ca4d16ef-9a5c-43df-811c-ea9cda47b19a}
      - IAM_CLIENT_SECRET=${IAM_CLIENT_SECRET:-automation_explorer_secret_key_123}
      - IAM_URL=${IAM_URL:-http://host.docker.internal:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./workspaces:/workspaces
    depends_on:
      - mongodb
      - redis
    networks:
      - lixionary-network

volumes:
  mongodb_data:
  redis_data:

networks:
  lixionary-network:
    driver: bridge
