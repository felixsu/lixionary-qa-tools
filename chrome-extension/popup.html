<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #faf9f6;
      color: #141413;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      border-b: 1px solid #e5e3db;
      padding-bottom: 12px;
      margin-bottom: 12px;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      margin: 0;
      color: #cc785c;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: #e6fffa;
      color: #234e52;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 9999px;
      border: 1px solid #b2f5ea;
    }
    .dot {
      width: 6px;
      height: 6px;
      background-color: #319795;
      border-radius: 50%;
    }
    .description {
      font-size: 12px;
      line-height: 1.5;
      color: #706e64;
      margin: 0 0 12px 0;
    }
    .footer {
      font-size: 10px;
      color: #8e8b82;
      text-align: center;
      border-t: 1px solid #e5e3db;
      padding-top: 8px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h3 class="title">Automation Explorer Helper</h3>
  </div>
  <p class="description">
    This extension bridges Automation Explorer page to allow importing cookies and local storage values from open tabs.
  </p>
  <div class="status-badge">
    <div class="dot"></div>
    Active & Connected
  </div>
  <div class="footer">
    Lixionary Automation Explorer &copy; 2026
  </div>
</body>
</html>
